name: Build APK Universal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
    - name: 📥 Clonar repositório
      uses: actions/checkout@v3

    - name: 🧰 Instalar Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3'

    - name: 🔄 Instalar dependências
      run: flutter pub get
      working-directory: ./flutter

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'
    - name: 🔍 Verificar versão do Java
      run: java -version
       
    - name: 🧪 Verificar ambiente
      run: flutter doctor
      working-directory: ./flutter

    - name: 🧪 Verificar Plugin
      run: flutter pub upgrade
      working-directory: ./flutter

    - name: 🧹 Limpar build
      run: flutter clean
      working-directory: ./flutter

    - name: 🚧 Preparar build
      run: flutter pub get
      working-directory: ./flutter
          
    - name: 🔧 Forçar versão do Gradle
      run: |
        echo "distributionUrl=https://services.gradle.org/distributions/gradle-8.0-bin.zip" > flutter/android/gradle/wrapper/gradle-wrapper.properties
      working-directory: ./flutter
      
    - name: 🔄 Sincronizar Gradle
      run: flutter pub get && ./flutter/android/gradlew --version
      working-directory: ./flutter

    - name: ⚙️ Build APK universal
      run: flutter build apk --release --no-shrink
      working-directory: ./flutter

    - name: 📦 Upload APK como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-apk-universal
        path: flutter/build/app/outputs/flutter-apk/app-release.apk
