name: Build APK Universal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
    - name: 📥 Clonar repositório
      uses: actions/checkout@v3

    - name: 🔍 Verificar estrutura do repositório
      run: ls -lah /home/runner/work/rustdesk || echo "Diretório não encontrado"

    - name: 🧰 Instalar Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3'

    - name: 🔄 Instalar dependências
      run: flutter pub get
      working-directory: ./flutter

    - name: 🔧 Instalar JDK 17 para AGP compatível
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 🔍 Verificar versão do Java
      run: java -version
        
    - name: 🧪 Verificar ambiente
      run: flutter doctor
      working-directory: ./flutter

    - name: 🧪 Atualizar Plugins
      run: flutter pub upgrade
      working-directory: ./flutter

    - name: 🧹 Limpar build
      run: flutter clean
      working-directory: ./flutter

    - name: 🚧 Preparar build
      run: flutter pub get
      working-directory: ./flutter
        
    - name: 🔍 Verificar diretório Flutter
      run: ls -lah flutter || echo "Diretório Flutter não encontrado"

    - name: 🏗️ Criar estrutura Android manualmente
      run: flutter create .
      working-directory: ./flutter

    - name: ✍️ Definir versão do Gradle
      run: echo "distributionUrl=https://services.gradle.org/distributions/gradle-8.0-bin.zip" | tee flutter/android/gradle/wrapper/gradle-wrapper.properties

    - name: 🔧 Ajustar permissões do Gradlew
      run: chmod +x flutter/android/gradlew

    - name: 🚀 Atualizar Gradle Wrapper
      run: |
        $(pwd)/android/gradlew wrapper --gradle-version 8.0
      working-directory: ./flutter

    - name: 🔄 Sincronizar Gradle
      run: flutter pub get && ./flutter/android/gradlew --version
      working-directory: ./flutter

    - name: ⚙️ Build APK Universal
      run: flutter build apk --release --no-shrink
      working-directory: ./flutter

    - name: 📦 Upload APK como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-apk-universal
        path: flutter/build/app/outputs/flutter-apk/app-release.apk
