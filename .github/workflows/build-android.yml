name: Build APK Universal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar repositório
      uses: actions/checkout@v3

    - name: 🧰 Instalar Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.1'

    - name: 🔄 Instalar dependências
      run: flutter pub get
      working-directory: ./flutter

    - name: 🧪 Verificar ambiente
      run: flutter doctor
      working-directory: ./flutter

    - name: ⚙️ Build APK universal
      run: flutter build apk --release --target-platform android-arm,android-arm64,android-x64
      working-directory: ./flutter

    - name: 📦 Upload APK como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-apk-universal
        path: flutter/build/app/outputs/flutter-apk/app-release.apk
