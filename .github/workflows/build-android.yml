name: Build APK Universal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
    - name: 📥 Clonar repositório
      uses: actions/checkout@v3

    - name: 🧰 Instalar Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3'

    - name: 🔄 Instalar dependências
      run: flutter pub get
      working-directory: ./flutter

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: 🔍 Verificar versão do Java
      run: java -version
        
    - name: 🧪 Verificar ambiente
      run: flutter doctor
      working-directory: ./flutter

    - name: 🧪 Verificar Plugin
      run: flutter pub upgrade
      working-directory: ./flutter

    - name: 🧹 Limpar build
      run: flutter clean
      working-directory: ./flutter

    - name: 🚧 Preparar build
      run: flutter pub get
      working-directory: ./flutter
        
    - name: 🔍 Verificar diretório e arquivos existentes
      run: ls -R flutter/android/gradle/wrapper || echo "Diretório não encontrado"

    - name: 🏗️ Criar diretório do Gradle Wrapper, se necessário
      run: mkdir -p flutter/android/gradle/wrapper

    - name: ✍️ Definir versão do Gradle
      run: echo "distributionUrl=https://services.gradle.org/distributions/gradle-8.0-bin.zip" | tee flutter/android/gradle/wrapper/gradle-wrapper.properties

    - name: 🔧 Garantir permissões corretas nos arquivos do Gradle
      run: chmod +x ./flutter/android/gradlew

    - name: 🚀 Atualizar Gradle Wrapper
      run: ./gradlew wrapper --gradle-version 8.0
      working-directory: ./flutter/android
      
    - name: 🔄 Sincronizar Gradle
      run: flutter pub get && ./gradlew --version
      working-directory: ./flutter/android

    - name: ⚙️ Build APK Universal
      run: flutter build apk --release --no-shrink
      working-directory: ./flutter

    - name: 📦 Upload APK como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-apk-universal
        path: flutter/build/app/outputs/flutter-apk/app-release.apk
