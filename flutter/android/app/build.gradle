def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new FileNotFoundException("Flutter SDK not encontrado. Defina a localização adicionando flutter.sdk no arquivo local.properties")
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    compileSdkVersion 33

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // Defina seu applicationId conforme sua aplicação
        applicationId "com.maximatech.com.br.maxviewer"
        minSdkVersion 21
        targetSdkVersion 33
        // Essas variáveis são geradas pelo Flutter – verifique se estão definidas corretamente
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // Configure o signing se necessário – ou deixe-o desabilitado se você for assinar a build manualmente
            signingConfig signingConfigs.release
            shrinkResources false
            minifyEnabled false
            // Se você usar proguard, adicione as regras necessárias
        }
    }
}

flutter {
    source '../..'
}

// Se houver outras customizações ou tarefas para inclusão de recursos (ícones, banner, etc.), 
// certifique-se de que elas estejam referenciadas aqui ou no arquivo de build de nível superior.
